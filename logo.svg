<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 760 240" width="760" height="240" role="img" aria-label="Atomica — Blast the elements to life">
  <!-- ===========================================================
       ATOMICA dynamic logo
       A spinning atom (orbiting electrons + pulsing nucleus) beside
       the neon wordmark. Animations are pure SVG (SMIL + CSS), so it
       plays as a plain <img> with no scripts.
       =========================================================== -->
  <defs>
    <radialGradient id="bg" cx="20%" cy="30%" r="90%">
      <stop offset="0%"  stop-color="#1a0a3a"/>
      <stop offset="100%" stop-color="#05030f"/>
    </radialGradient>
    <linearGradient id="wm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00eaff"/>
      <stop offset="38%"  stop-color="#b14bff"/>
      <stop offset="70%"  stop-color="#ff2bd6"/>
      <stop offset="100%" stop-color="#ffae00"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <style>
      .wordmark { animation: pulse 2.6s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity: .92 } 50% { opacity: 1 } }
    </style>
  </defs>

  <!-- panel background -->
  <rect x="1" y="1" width="758" height="238" rx="30" fill="url(#bg)" stroke="#5a36b0" stroke-opacity="0.5"/>

  <!-- ================= ATOM GLYPH ================= -->
  <g transform="translate(130 120)" filter="url(#glow)">
    <!-- three tilted orbits, each carrying an electron that travels around it -->
    <g transform="rotate(0)">
      <path id="orbit1" d="M -78,0 a 78,28 0 1,0 156,0 a 78,28 0 1,0 -156,0"
            fill="none" stroke="#00eaff" stroke-width="3" stroke-opacity="0.9"/>
      <circle r="6" fill="#00eaff">
        <animateMotion dur="3.6s" repeatCount="indefinite" rotate="auto">
          <mpath xlink:href="#orbit1"/>
        </animateMotion>
      </circle>
    </g>
    <g transform="rotate(60)">
      <path id="orbit2" d="M -78,0 a 78,28 0 1,0 156,0 a 78,28 0 1,0 -156,0"
            fill="none" stroke="#b14bff" stroke-width="3" stroke-opacity="0.9"/>
      <circle r="6" fill="#b14bff">
        <animateMotion dur="4.6s" begin="-1.2s" repeatCount="indefinite" rotate="auto">
          <mpath xlink:href="#orbit2"/>
        </animateMotion>
      </circle>
    </g>
    <g transform="rotate(120)">
      <path id="orbit3" d="M -78,0 a 78,28 0 1,0 156,0 a 78,28 0 1,0 -156,0"
            fill="none" stroke="#ff2bd6" stroke-width="3" stroke-opacity="0.9"/>
      <circle r="6" fill="#ff2bd6">
        <animateMotion dur="5.4s" begin="-2.4s" repeatCount="indefinite" rotate="auto">
          <mpath xlink:href="#orbit3"/>
        </animateMotion>
      </circle>
    </g>

    <!-- nucleus -->
    <circle r="22" fill="#ffae00" filter="url(#softglow)" opacity="0.55">
      <animate attributeName="r" values="20;26;20" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="12" fill="#fff5d6"/>
    <circle r="6" fill="#ffae00"/>
  </g>

  <!-- ================= WORDMARK ================= -->
  <g class="wordmark" filter="url(#glow)">
    <text x="285" y="118" font-family="Segoe UI, Arial, sans-serif" font-weight="900"
          font-size="74" letter-spacing="4" fill="url(#wm)">ATOMICA</text>
  </g>
  <text x="288" y="158" font-family="Segoe UI, Arial, sans-serif" font-weight="700"
        font-size="20" letter-spacing="6" fill="#ff7bf0">BLAST THE ELEMENTS TO LIFE</text>
</svg>
